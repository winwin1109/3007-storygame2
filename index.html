<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>聽故事學文書二: 禮儀文書挑戰賽</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');

        /* 統一所有元素的字體 */
        * {
            font-family: 'Noto Sans HK', 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            box-sizing: border-box;
        }

        :root {
            --mario-blue: #5c94fc;
            --mario-brick: #c84c0c;
            --mario-ground: #00a800;
            --ui-bg: rgba(255, 255, 255, 0.95);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; 
            height: 100%; height: 100dvh;
            background-color: #222;
            display: flex; justify-content: center; align-items: center;
            touch-action: none;
            overflow: hidden;
        }

        /* 遊戲視窗 */
        #game-window {
            width: 100vw;
            height: 100%; height: 100dvh;
            max-width: 1200px;
            max-height: 900px;
            background: linear-gradient(180deg, #5c94fc 0%, #a0c4ff 100%);
            position: relative;
            overflow: hidden;
            border: none;
            border-radius: 0;
        }

        @media (min-width: 768px) and (min-height: 600px) {
            #game-window {
                width: 95vw; height: 90vh;
                border: 8px solid #000;
                border-radius: 20px;
                box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            }
        }

        /* UI 畫面層 */
        .screen {
            position: absolute; inset: 0; display: none;
            flex-direction: column; align-items: center;
            z-index: 100; padding: 20px 10px;
            overflow-y: auto; touch-action: pan-y;
        }
        .screen.active { display: flex; }

        .back-btn {
            position: absolute; 
            top: calc(15px + env(safe-area-inset-top, 0px)); 
            left: calc(15px + env(safe-area-inset-left, 0px));
            background: #f1c40f; color: #333; border: 3px solid #000;
            padding: clamp(6px, 2vw, 8px) clamp(10px, 3vw, 20px); 
            font-size: clamp(16px, 4vw, 20px); 
            border-radius: 10px;
            cursor: pointer; box-shadow: 3px 3px 0 #000;
            z-index: 9999;
        }
        .back-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 #000; }

        h1.title {
            font-size: clamp(32px, 8vw, 48px); color: #fff;
            text-shadow: 4px 4px 0 #e74c3c, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            margin-top: calc(70px + env(safe-area-inset-top, 0px));
            letter-spacing: 2px; text-align: center; padding: 0 10px;
        }

        #screen-main h1.title { margin-top: calc(40px + env(safe-area-inset-top, 0px)); }

        .menu-btn {
            background: #e74c3c; color: white; border: 4px solid #fff;
            padding: clamp(10px, 3vw, 15px) 20px; 
            font-size: clamp(20px, 5vw, 28px); 
            border-radius: 15px; cursor: pointer; box-shadow: 0 6px 0 #c0392b;
            margin: 10px; transition: transform 0.1s;
            width: 80%; max-width: 300px; text-align: center;
        }
        .menu-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #c0392b; }
        .menu-btn.blue { background: #3498db; box-shadow: 0 6px 0 #2980b9; }
        .menu-btn.blue:active { box-shadow: 0 0 0 #2980b9; }
        .menu-btn.green { background: #2ecc71; box-shadow: 0 6px 0 #27ae60; }
        .menu-btn.green:active { box-shadow: 0 0 0 #27ae60; }

        .mode-buttons { display: flex; gap: 15px; margin-top: 5vh; flex-wrap: wrap; justify-content: center; width: 100%; }

        /* 讀書信視圖 */
        .reader-container {
            background: var(--ui-bg); border: 4px solid #000; border-radius: 15px;
            width: 90%; max-width: 800px; 
            height: calc(100% - 130px - env(safe-area-inset-top, 0px)); 
            margin-top: calc(70px + env(safe-area-inset-top, 0px)); 
            padding: 20px; overflow-y: auto; text-align: left; box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
            font-size: clamp(16px, 4vw, 22px); line-height: 1.6; color: #333;
            touch-action: pan-y; position: relative;
        }

        /* 💡 互動提示按鈕與側滑面板 */
        .tip-btn {
            display: inline-flex; justify-content: center; align-items: center;
            background: #f39c12; color: white; border: 2px solid #000;
            border-radius: 50%; width: clamp(26px, 6vw, 32px); height: clamp(26px, 6vw, 32px);
            font-size: clamp(14px, 3.5vw, 18px); cursor: pointer;
            box-shadow: 2px 2px 0 #000; margin-left: 8px; margin-right: 4px;
            vertical-align: middle; flex-shrink: 0; padding: 0;
            transition: transform 0.1s;
        }
        .tip-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 #000; }

        .tip-panel {
            position: absolute; top: 0; right: -120%; /* 預設藏在畫面右外側 */
            width: 85%; max-width: 350px; height: 100%;
            background: rgba(253, 246, 227, 0.98); 
            border-left: 6px solid #e74c3c; box-shadow: -10px 0 20px rgba(0,0,0,0.4);
            transition: right 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 2000; 
            padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 20px 20px;
            display: flex; flex-direction: column; overflow-y: auto; touch-action: pan-y;
        }
        .tip-panel.show { right: 0; }
        .close-tip-btn {
            align-self: flex-start; background: #333; color: white; border: 2px solid #000;
            padding: 8px 15px; border-radius: 10px; font-size: 16px; cursor: pointer;
            margin-bottom: 20px; box-shadow: 2px 2px 0 #000;
        }
        .close-tip-btn:active { transform: translate(2px,2px); box-shadow: 0 0 0 #000; }
        .tip-panel h3 { color: #e74c3c; margin-top: 0; font-size: 24px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        .tip-panel p { font-size: 18px; line-height: 1.6; color: #333; font-weight: bold; }

        /* 閃卡視圖 */
        .card-instruction {
            color: white; font-size: clamp(18px, 4vw, 24px); 
            margin-top: calc(70px + env(safe-area-inset-top, 0px)); 
            text-shadow: 2px 2px #000; margin-bottom: 2vh;
        }
        .flashcard-container { width: 90%; max-width: 650px; height: 45vh; max-height: 350px; perspective: 1000px; cursor: pointer; }
        .flashcard { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            border: 6px solid #000; border-radius: 20px; padding: 20px; text-align: center; line-height: 1.4;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3); font-size: clamp(20px, 5vw, 28px);
        }
        .card-front { background: #f1c40f; color: #333; }
        .card-back { background: #3498db; color: white; transform: rotateY(180deg); font-size: clamp(18px, 4.5vw, 24px); }
        .card-controls { margin-top: 30px; display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .card-btn { width: auto; min-width: 100px; padding: 10px 15px; font-size: clamp(16px, 4vw, 20px); margin: 0; }
        
        /* 遊戲視圖 */
        #game-layer { position: absolute; inset: 0; display: none; overflow: hidden; background: linear-gradient(180deg, #5c94fc 0%, #a0c4ff 100%); touch-action: none; }
        #score-display { position: absolute; top: calc(15px + env(safe-area-inset-top, 0px)); right: calc(15px + env(safe-area-inset-right, 0px)); font-size: clamp(18px, 4vw, 28px); color: #fff; text-shadow: 2px 2px 0 #000; z-index: 9999; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 15px; border: 3px solid #000; }
        .ground { position: absolute; bottom: 0; width: 100%; height: 60px; background-color: var(--mario-brick); background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000); background-size: 20px 20px; background-position: 0 0, 10px 10px; border-top: 4px solid #000; z-index: 10; }
        
        .cloud-wrapper { position: absolute; top: calc(80px + env(safe-area-inset-top, 0px)); left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; z-index: 5; filter: drop-shadow(3px 0 0 #000) drop-shadow(-3px 0 0 #000) drop-shadow(0 3px 0 #000) drop-shadow(0 -3px 0 #000) drop-shadow(6px 6px 0 rgba(0,0,0,0.3)); }
        .cloud-body { background: #fff; border-radius: 50px; padding: clamp(10px, 3vw, 25px) clamp(15px, 4vw, 40px); min-height: clamp(60px, 10vw, 80px); display: flex; align-items: center; justify-content: center; position: relative; font-size: clamp(16px, 4vw, 22px); text-align: center; }
        .cloud-body::before, .cloud-body::after { content: ''; position: absolute; background: #fff; border-radius: 50%; }
        .cloud-body::before { width: clamp(60px, 10vw, 100px); height: clamp(60px, 10vw, 100px); top: -20px; left: 10%; }
        .cloud-body::after { width: clamp(80px, 15vw, 130px); height: clamp(80px, 15vw, 130px); top: -30px; right: 10%; }
        .cloud-text { position: relative; z-index: 2; line-height: 1.4; }

        .bricks-container { position: absolute; bottom: clamp(220px, 35dvh, 280px); width: 100%; display: flex; justify-content: center; gap: 2%; z-index: 5; padding: 0 10px; }
        .brick { background-color: #c84c0c; border: 3px solid #000; flex: 1; max-width: 220px; min-height: clamp(50px, 10vw, 60px); background-image: linear-gradient(to right, transparent 95%, #000 95%), linear-gradient(to bottom, transparent 95%, #000 95%); background-size: 20px 20px; display: flex; justify-content: center; align-items: center; color: #fff; font-size: clamp(14px, 3.5vw, 20px); font-weight: bold; text-shadow: 2px 2px 0 #000; padding: 5px; text-align: center; position: relative; line-height: 1.2; }
        .brick.hit { animation: bounce 0.2s ease; }
        @keyframes bounce { 0% { transform: translateY(0); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0); } }

        #mario { position: absolute; width: 60px; height: 80px; bottom: 60px; left: 0; font-size: 60px; line-height: 80px; text-align: center; z-index: 20; transform-origin: center; }
        #mario.flip { transform: scaleX(-1); }

        .item-popup { position: absolute; font-size: clamp(30px, 8vw, 50px); opacity: 0; z-index: 4; transition: all 0.5s ease-out; pointer-events: none; }
        .item-popup.show { opacity: 1; transform: translateY(-60px); }

        /* 防縮放控制區 */
        .controls-ui {
            position: absolute; bottom: 10px; width: 100%; height: 120px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5vw; z-index: 100;
        }
        .d-pad-container { width: 120px; height: 120px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.3); }
        .d-pad { position: relative; width: 100px; height: 100px; }
        .d-center { position: absolute; top: 33px; left: 33px; width: 34px; height: 34px; background: #333; z-index: 1; }
        .d-btn, .a-btn {
            /* 關鍵防縮放 CSS */
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        .d-btn { position: absolute; background: #2a2a2a; display: flex; justify-content: center; align-items: center; color: #555; font-size: 14px; font-weight: bold; box-shadow: inset -2px -2px 0 #111, inset 2px 2px 0 #555; z-index: 2; }
        .d-btn.active-btn { cursor: pointer; color: white; text-shadow: 1px 1px 0 #000; font-size: 18px; }
        .d-btn.active-btn:active { background: #111; box-shadow: inset 2px 2px 0 #000; }
        .d-up { top: 0; left: 33px; width: 34px; height: 34px; border-radius: 8px 8px 0 0; }
        .d-down { bottom: 0; left: 33px; width: 34px; height: 34px; border-radius: 0 0 8px 8px; }
        .d-left { top: 33px; left: 0; width: 34px; height: 34px; border-radius: 8px 0 0 8px; }
        .d-right { top: 33px; right: 0; width: 34px; height: 34px; border-radius: 0 8px 8px 0; }
        
        .action-pad-container { width: 100px; height: 100px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.3); }
        .a-btn { width: 70px; height: 70px; border-radius: 50%; background: #e74c3c; border: 4px solid #8e0000; box-shadow: inset -3px -3px 0 rgba(0,0,0,0.3), inset 3px 3px 0 rgba(255,255,255,0.4), 0 6px 0 #8e0000; cursor: pointer; color: white; font-size: 24px; font-weight: bold; line-height: 62px; text-align: center; transition: all 0.1s; }
        .a-btn:active { transform: translateY(6px); box-shadow: inset -3px -3px 0 rgba(0,0,0,0.3), inset 3px 3px 0 rgba(255,255,255,0.4), 0 0 0 #8e0000; }

        #game-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border: 5px solid #000; border-radius: 20px; padding: clamp(15px, 4vw, 30px); text-align: center; z-index: 200; display: none; box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; touch-action: pan-y; }
        #msg-title { font-size: clamp(24px, 6vw, 36px); margin: 0 0 10px 0; }
        #msg-reward { font-size: clamp(18px, 4vw, 24px); font-weight: bold; margin: 0; }
        #msg-analysis { font-size: clamp(14px, 3.5vw, 18px); color: #333; text-align: left; background: #f0f4f8; padding: 15px; border-radius: 10px; border: 3px solid #b6c6d3; margin-top: 15px; margin-bottom: 20px; line-height: 1.5; display: none; }

    </style>
</head>
<body>

<div id="game-window">
    
    <!-- 主選單 -->
    <div id="screen-main" class="screen active">
        <h1 class="title">聽故事學文書二:<br>禮儀文書挑戰賽</h1>
        <p style="color:white; font-size:clamp(18px, 4vw, 24px); text-shadow: 2px 2px #000; text-align: center; margin-bottom: 10px;">請選擇你要探索的文書：</p>
        <button class="menu-btn" onclick="selectLetter('thanks')">💌 感謝信</button>
        <button class="menu-btn" onclick="selectLetter('invitation')">✉️ 邀請信</button>
        <button class="menu-btn" onclick="selectLetter('sympathy')">🩹 慰問信</button>
    </div>

    <!-- 子選單 -->
    <div id="screen-mode" class="screen">
        <button class="back-btn" onclick="showScreen('screen-main')">⬅️ 返回</button>
        <h1 class="title" id="mode-title">書信名稱</h1>
        <div class="mode-buttons">
            <button class="menu-btn blue card-btn" style="width:auto;" onclick="startMode('read')">📖 讀書信</button>
            <button class="menu-btn green card-btn" style="width:auto;" onclick="startMode('cards')">🃏 看卡片</button>
            <button class="menu-btn card-btn" style="width:auto;" onclick="startMode('quiz')">🎮 去挑戰</button>
        </div>
    </div>

    <!-- 模式 1：讀書信 -->
    <div id="screen-read" class="screen">
        <button class="back-btn" onclick="showScreen('screen-mode')">⬅️ 返回</button>
        <div class="reader-container" id="reader-content"></div>

        <!-- 💡 提示卡片側滑面板 -->
        <div id="tip-panel" class="tip-panel">
            <button class="close-tip-btn" onclick="hideTip()">✖ 隱藏重點</button>
            <h3 id="tip-title">寫作重點</h3>
            <!-- 這裡改為使用 innerHTML 來支援 HTML 排版 -->
            <p id="tip-content">這裡顯示內容...</p>
        </div>
    </div>

    <!-- 模式 2：看卡片 -->
    <div id="screen-cards" class="screen">
        <button class="back-btn" onclick="showScreen('screen-mode')">⬅️ 返回</button>
        <div class="card-instruction">點擊卡片翻面背誦</div>
        <div class="flashcard-container" onclick="flipCard()">
            <div class="flashcard" id="flashcard">
                <div class="card-face card-front" id="card-front">正面問題</div>
                <div class="card-face card-back" id="card-back">背面答案</div>
            </div>
        </div>
        <div class="card-controls">
            <button class="menu-btn blue card-btn" onclick="prevCard()">上一張</button>
            <span id="card-counter" style="color:white; font-size:clamp(18px, 4.5vw, 24px); text-shadow:2px 2px #000;">1 / 5</span>
            <button class="menu-btn blue card-btn" onclick="nextCard()">下一張</button>
        </div>
    </div>

    <!-- 模式 3：去挑戰 (遊戲) -->
    <div id="game-layer">
        <button class="back-btn" onclick="exitGame()">⬅️ 逃跑</button>
        <div id="score-display">🍄 分數: <span id="current-score">0</span></div>
        <div class="cloud-wrapper"><div class="cloud-body"><span class="cloud-text" id="quiz-question">題目載入中...</span></div></div>
        <div class="bricks-container" id="bricks-container"></div>
        <div id="mario">🐶</div>
        <div class="ground"></div>

        <div class="controls-ui">
            <div class="d-pad-container">
                <div class="d-pad">
                    <div class="d-center"></div>
                    <div class="d-btn d-up"></div><div class="d-btn d-down"></div>
                    <div class="d-btn d-left active-btn" id="btn-left">左</div>
                    <div class="d-btn d-right active-btn" id="btn-right">右</div>
                </div>
            </div>
            <div class="action-pad-container">
                <div class="a-btn" id="btn-jump">跳</div>
            </div>
        </div>

        <div id="game-msg">
            <h2 id="msg-title"></h2><p id="msg-reward"></p><div id="msg-analysis"></div>
            <button class="menu-btn blue card-btn" style="margin-top:15px;" onclick="nextQuizQuestion()">繼續</button>
        </div>
    </div>

</div>

<script>
    // --- 音效系統 ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playSound(type) {
        if (!audioCtx) initAudio(); if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'click') {
            osc.type = 'square'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
            gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'jump') {
            osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(300, now + 0.2);
            gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.linearRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'hit') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
            gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'correct') {
            osc.type = 'square'; osc.frequency.setValueAtTime(987.77, now); osc.frequency.setValueAtTime(1318.51, now + 0.1);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.setValueAtTime(0.1, now + 0.1); gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(100, now + 0.3);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'win') {
            osc.type = 'square';
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => { osc.frequency.setValueAtTime(freq, now + i * 0.12); });
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
            osc.start(now); osc.stop(now + 0.6);
        }
    }

    document.addEventListener('pointerdown', (e) => {
        initAudio();
        if (e.target.closest('button') || e.target.closest('.flashcard-container')) {
            if (e.target.closest('.a-btn') || e.target.closest('.d-btn')) return;
            playSound('click');
        }
    });

    // --- 💡 寫作重點提示資料庫 (支援 HTML 換行與重點顏色) ---
    const tipData = {
        thanks: {
            salutation: { title: "上款", text: "寫清楚收信人的機構名稱、職銜及姓名，並加上「台鑒」以表示尊敬。<br><br><span style='color:#e74c3c;'>💡 詞語解釋：</span><br>「台鑒」是傳統書信中請平輩或長輩看信的敬辭，帶有請對方明察的意思。" },
            title: { title: "標題", text: "必須置中排列，並且要扼要說明信件的目的（例如：感謝接待參觀食品廠）。" },

            `,
            cards: [
                { q: "同學間慰問信的「上款」有何寫作特點？", a: "平輩同學間直接稱呼姓名即可，不需加「台鑒」以表達親切與溫暖。" },
                { q: "慰問信的「標題」寫作特點？", a: "可以置中寫明具體事由、或只寫「慰問信」；也可為了表達親切感而完全省略標題，避免過於生硬。" },
                { q: "慰問信正文「第一段」的核心重點是？", a: "點出得知意外事件的擔心，並代表班級或機構表達最真誠的慰慰。" },
                { q: "慰問信正文「第二段」的核心重點是？", a: "勸慰對方安心靜養，並主動提出具體的協助方案（如幫忙補筆記），讓對方無後顧之憂。" },
                { q: "慰問信正文「第三段」的核心重點是？", a: "說明後續的探訪計劃，並表達隨時願意提供幫助的善意。" },
                { q: "慰問信的「祝頌語」與「下款」特點？", a: "常祝願「早日康復」；下款平輩之間使用「啟」或「上」即可，不需用太正式的「謹啟」。" }
            ],
            quiz: [
                { q: "同學之間的慰問信，上款稱呼最適合的是？", opts: ["敬愛的陳小明：", "陳小明同學 台鑒", "陳小明同學："], ans: 2, rationales: ["錯誤。「敬愛的」通常用於對長輩或師長，用在同學身上太過隆重且不自然。", "錯誤。平輩同學之間無需使用「台鑒」，否則會顯得太有距離感。", "正確！同學間直接稱呼姓名即可，既有禮貌又能展現親切與溫暖。"] },
                { q: "同學間的慰問信，關於「標題」的處理，下列何者最適當？", opts: ["可以省略標題，以表達親切感", "必須詳細寫出受傷經過", "標題必須靠右對齊"], ans: 0, rationales: ["正確！為了避免公事公辦的生硬感，平輩間的慰問信可完全省略標題，顯得更溫暖親切。", "錯誤。標題只要扼要點明事由（或直接省略）即可，不應在標題長篇大論。", "錯誤。如果決定要寫標題，格式上必須是「置中」排列，而非靠右。"] },
                { q: "正文第一段應該表達怎樣的語氣？", opts: ["嚴厲指責他不小心", "擔心與真誠的慰問", "平淡無奇的陳述"], ans: 1, rationales: ["錯誤。受傷的同學最需要的是安慰，指責會讓對方感到壓力與難過。", "正確！第一段應點出得知意外的擔心，並代表班級送上最真誠的關懷。", "錯誤。慰問信的核心在於「同理心」，平淡的陳述無法傳達溫暖的情感。"] },
                { q: "為了讓受傷同學安心，正文第二段通常會加入甚麼內容？", opts: ["主動提出具體的課業協助", "要求他趕快出院", "抱怨他拖累了全班進度"], ans: 0, rationales: ["正確！提供實質幫助（如代為整理筆記），能讓對方無後顧之憂地安心休養。", "錯誤。慰問信應勸慰對方聽從醫囑、安心靜養，不該給予出院壓力。", "錯誤。這充滿惡意，完全違背了慰問信關懷與支持的本意。"] },
                { q: "正文第三段提及「探訪計劃」的目的是甚麼？", opts: ["去醫院玩樂", "表達隨時願意提供幫助與溫暖", "去檢查他是不是裝病"], ans: 1, rationales: ["錯誤。醫院是需要安靜休養的地方，探訪絕不是為了玩樂。", "正確！提及探訪能傳達全體同學的支持，給予受傷同學精神上的鼓勵。", "錯誤。這缺乏對同學的基本信任，不該出現於表達善意的文書中。"] },
                { q: "平輩同學之間的署名，最適當的啟辭是？", opts: ["謹啟", "啟", "敬啟"], ans: 1, rationales: ["錯誤。「謹啟」代表非常恭敬地陳述，用於對長輩或上級，對平輩使用過於隆重。", "正確！平輩同學之間的署名，簡單用「啟」或「上」即可，既有禮貌又親切。", "錯誤。「敬啟」同樣帶有對長輩的恭敬意味，不適用於平輩。"] }
            ]
        }
    };

    // --- 系統狀態 ---
    let currentDataKey = '';
    let cardIndex = 0;
    
    let gameWidth = window.innerWidth;
    function updateGameDimensions() {
        const gw = document.getElementById('game-window');
        if (gw) gameWidth = gw.clientWidth;
    }
    window.addEventListener('resize', updateGameDimensions);

    // --- 介面切換 ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen, #game-layer').forEach(el => {
            el.classList.remove('active');
            if(el.id === 'game-layer') el.style.display = 'none';
        });
        hideTip(); // 切換畫面時自動隱藏重點提示卡片
        const target = document.getElementById(screenId);
        if(target.id === 'game-layer') {
            target.style.display = 'block';
        } else {
            target.classList.add('active');
            target.scrollTo(0, 0); 
        }
    }

    function selectLetter(key) {
        currentDataKey = key;
        document.getElementById('mode-title').innerText = db[key].title;
        showScreen('screen-mode');
    }

    function startMode(mode) {
        const data = db[currentDataKey];
        if(mode === 'read') {
            document.getElementById('reader-content').innerHTML = data.content;
            showScreen('screen-read');
        } else if (mode === 'cards') {
            cardIndex = 0;
            updateCardUI();
            showScreen('screen-cards');
        } else if (mode === 'quiz') {
            startMarioGame();
        }
    }

    // --- 閃卡邏輯 ---
    function updateCardUI() {
        const cards = db[currentDataKey].cards;
        document.getElementById('flashcard').classList.remove('is-flipped');
        
        setTimeout(() => {
            document.getElementById('card-front').innerText = cards[cardIndex].q;
            document.getElementById('card-back').innerText = cards[cardIndex].a;
            document.getElementById('card-counter').innerText = `${cardIndex + 1} / ${cards.length}`;
        }, 150);
    }
    function flipCard() { document.getElementById('flashcard').classList.toggle('is-flipped'); }
    function nextCard() { const cards = db[currentDataKey].cards; if(cardIndex < cards.length - 1) { cardIndex++; updateCardUI(); } }
    function prevCard() { if(cardIndex > 0) { cardIndex--; updateCardUI(); } }

    // --- 測驗遊戲引擎 ---
    let gameLoop;
    let quizIndex = 0;
    let currentScore = 0;
    let isGameRunning = false;
    let hasAnswered = false;

    const mState = { x: 0, y: 0, vx: 0, vy: 0, width: 60, height: 80, isGrounded: true, speed: 6, jumpPower: -19, gravity: 0.8 };
    const keys = { left: false, right: false, jump: false };

    function startMarioGame() {
        showScreen('game-layer');
        quizIndex = 0; currentScore = 0; 
        updateScoreDisplay(); updateGameDimensions(); 
        loadQuizQuestion();
        
        bindControls();
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);

        isGameRunning = true;
        requestAnimationFrame(physicsLoop);
    }

    function exitGame() {
        isGameRunning = false;
        window.removeEventListener('keydown', handleKeyDown);
        window.removeEventListener('keyup', handleKeyUp);
        showScreen('screen-mode');
    }

    function updateScoreDisplay() { document.getElementById('current-score').innerText = currentScore; }

    function loadQuizQuestion() {
        hasAnswered = false;
        const qData = db[currentDataKey].quiz[quizIndex];
        document.getElementById('quiz-question').innerText = qData.q;
        
        const container = document.getElementById('bricks-container');
        container.innerHTML = '';
        
        qData.opts.forEach((opt, idx) => {
            let b = document.createElement('div');
            b.className = 'brick'; b.innerText = opt;
            b.dataset.index = idx; b.dataset.correct = (idx === qData.ans);
            let item = document.createElement('div');
            item.className = 'item-popup'; item.innerText = (idx === qData.ans) ? '🍄' : '🌺';
            b.appendChild(item); container.appendChild(b);
        });

        mState.x = (gameWidth / 2) - (mState.width / 2); 
        mState.y = 0; mState.vx = 0; mState.vy = 0;
        updateMarioDOM();
    }

    function bindControls() {
        const btnL = document.getElementById('btn-left');
        const btnR = document.getElementById('btn-right');
        const btnJ = document.getElementById('btn-jump');

        const press = (key) => { keys[key] = true; };
        const release = (key) => { keys[key] = false; };

        // 綁定按鈕並加入 preventDefault() 嚴格阻擋手機 Safari/Chrome 的雙擊放大行為
        const bindButton = (el, key, isJump) => {
            el.addEventListener('touchstart', (e) => {
                e.preventDefault(); // 阻擋預設雙擊放大與選取
                if(isJump) {
                    if(mState.isGrounded) { mState.vy = mState.jumpPower; mState.isGrounded = false; playSound('jump'); }
                } else {
                    press(key);
                }
            }, {passive: false});

            el.addEventListener('touchend', (e) => {
                e.preventDefault();
                if(!isJump) release(key);
            }, {passive: false});

            el.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                if(!isJump) release(key);
            }, {passive: false});

            // 保留給電腦滑鼠點擊用
            el.onmousedown = (e) => {
                if(isJump) {
                    if(mState.isGrounded) { mState.vy = mState.jumpPower; mState.isGrounded = false; playSound('jump'); }
                } else {
                    press(key);
                }
            };
            el.onmouseup = () => { if(!isJump) release(key); };
            el.onmouseleave = () => { if(!isJump) release(key); };
        };

        bindButton(btnL, 'left', false);
        bindButton(btnR, 'right', false);
        bindButton(btnJ, 'jump', true);
    }

    function handleKeyDown(e) {
        if(e.key === 'ArrowLeft') keys.left = true;
        if(e.key === 'ArrowRight') keys.right = true;
        if(e.key === 'ArrowUp' || e.key === ' ') {
            if(mState.isGrounded) { mState.vy = mState.jumpPower; mState.isGrounded = false; playSound('jump'); }
        }
    }
    function handleKeyUp(e) {
        if(e.key === 'ArrowLeft') keys.left = false;
        if(e.key === 'ArrowRight') keys.right = false;
    }

    function physicsLoop(timestamp) {
        if(!isGameRunning) return;
        requestAnimationFrame(physicsLoop);

        if (keys.left) { mState.vx = -mState.speed; document.getElementById('mario').classList.add('flip'); document.getElementById('mario').innerText = '🐕';}
        else if (keys.right) { mState.vx = mState.speed; document.getElementById('mario').classList.remove('flip'); document.getElementById('mario').innerText = '🐕';}
        else { mState.vx = 0; document.getElementById('mario').innerText = mState.isGrounded ? '🐶' : '🐩'; }

        mState.x += mState.vx;
        
        if (mState.x < 0) mState.x = 0;
        if (mState.x > gameWidth - mState.width) mState.x = gameWidth - mState.width;

        mState.vy += mState.gravity;
        mState.y += mState.vy;

        if (mState.y >= 0) {
            mState.y = 0; mState.vy = 0; mState.isGrounded = true;
        } else {
            mState.isGrounded = false; document.getElementById('mario').innerText = '🐩';
        }

        if (mState.vy < 0 && !hasAnswered) {
            checkBrickCollision();
        }

        updateMarioDOM();
    }

    function updateMarioDOM() {
        const m = document.getElementById('mario');
        m.style.left = mState.x + 'px';
        m.style.bottom = (60 + Math.abs(mState.y)) + 'px';
    }

    function checkBrickCollision() {
        const marioRect = document.getElementById('mario').getBoundingClientRect();
        const bricks = document.querySelectorAll('.brick');
        
        bricks.forEach(brick => {
            const brickRect = brick.getBoundingClientRect();
            if (marioRect.top <= brickRect.bottom && 
                marioRect.top >= brickRect.top &&
                marioRect.right > brickRect.left + 10 && 
                marioRect.left < brickRect.right - 10) 
            {
                mState.vy = 2; // 反彈
                triggerAnswer(brick);
            }
        });
    }

    function triggerAnswer(brickEl) {
        if(hasAnswered) return;
        hasAnswered = true;
        keys.left = false; keys.right = false;

        playSound('hit');
        brickEl.classList.add('hit');
        
        const idx = parseInt(brickEl.dataset.index);
        const qData = db[currentDataKey].quiz[quizIndex];
        const isCorrect = (idx === qData.ans);
        const rationale = qData.rationales[idx];
        
        const popup = brickEl.querySelector('.item-popup');
        popup.classList.add('show');

        setTimeout(() => {
            if (isCorrect) {
                playSound('correct'); currentScore += 2; updateScoreDisplay();
                showGameMsg("✅ 答對喇！", "獲得變大蘑菇！⭐ 分數 +2", rationale, "#27ae60");
            } else {
                playSound('wrong'); currentScore -= 1; updateScoreDisplay();
                showGameMsg("❌ 哎呀！", "頂錯磚頭，被毒花咬到了！💔 分數 -1", rationale, "#e74c3c");
            }
        }, 800);
    }

    function showGameMsg(title, reward, analysis, color) {
        document.getElementById('msg-title').innerText = title;
        document.getElementById('msg-title').style.color = color;
        document.getElementById('msg-reward').innerText = reward;
        document.getElementById('msg-reward').style.color = color;
        
        const analysisEl = document.getElementById('msg-analysis');
        if (analysis) {
            analysisEl.style.display = 'block';
            analysisEl.innerHTML = `<strong>💡 錯誤/選項分析：</strong><br>${analysis}`;
        } else {
            analysisEl.style.display = 'none';
        }
        
        const msgBox = document.getElementById('game-msg');
        msgBox.style.display = 'block';
        msgBox.scrollTo(0,0);
    }

    function nextQuizQuestion() {
        document.getElementById('game-msg').style.display = 'none';
        
        const hitBrick = document.querySelector('.brick.hit');
        if (hitBrick && hitBrick.dataset.correct === 'true') {
            quizIndex++;
        }
        
        if (quizIndex < db[currentDataKey].quiz.length) {
            loadQuizQuestion();
        } else {
            playSound('win');
            showGameMsg("🎉 挑戰成功！", `你已完全掌握這份禮儀文書！\n🍄 你的總分是：${currentScore} 分`, null, "#f1c40f");
            
            const btn = document.querySelector('#game-msg button');
            btn.innerText = "完成";
            btn.onclick = () => {
                document.getElementById('game-msg').style.display = 'none';
                btn.innerText = "繼續";
                btn.onclick = nextQuizQuestion; 
                exitGame();
            };
        }
    }

    updateGameDimensions();

</script>
</body>
